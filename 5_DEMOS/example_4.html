<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 40px;
        }

        input {
            width: 80px;
            padding: 8px;
            font-size: 16px;
            text-align: center;
        }

        button {
            padding: 8px 14px;
            font-size: 16px;
            margin: 4px;
            cursor: pointer;
        }

        #result {
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Simple Calculator</h1>

    <input id="num1" type="text" placeholder="0">
    <input id="num2" type="text" placeholder="0">

    <div>
        <button id="addBtn">+</button>
        <button id="subBtn">−</button>
        <button id="mulBtn">×</button>
        <button id="divBtn">÷</button>
    </div>

    <p id="result">Result: </p>

    <script>
    </script>
</body>

</html>
